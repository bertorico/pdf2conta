name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev tooling
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (scoped)
        run: mypy

      - name: Pytest with coverage
        # Coverage is measured only on the testable modules (see
        # [tool.coverage.run] in pyproject.toml); UI/CLI entry-points that
        # need a live GPU/vLLM/Gradio runtime are omitted. Fails under 75%.
        run: pytest --cov --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
